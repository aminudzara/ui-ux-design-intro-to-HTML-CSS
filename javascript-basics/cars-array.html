<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cars Listing Challenge</title>
  </head>
  <body>
    <script>
      let cars = ["toyota", "honda", "mazda", "mitsubishi", "tesla", "lexus"];

      console.log("First car: " + cars[0]); // First car in the array
      console.log("Last car: " + cars[cars.length - 1]); // Last car in the array

      cars.push("mercedes-benz"); // Add a new car to the end of the array
      console.log("Last car after adding: " + cars[cars.length - 1]); // Last car in the array

      // Loop through the array and print each car
      for (let i = 0; i < cars.length; i++) {
        console.log("Car " + (i + 1) + ": " + cars[i]);
      }
    </script>
  </body>
</html>
