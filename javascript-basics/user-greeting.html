<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Greeting Challenge</title>
  </head>
  <body>
    <script>
      // Collect information from the user and store it in a variable
      let username = prompt("Please enter your name:");

      // Display the greeting on the page in big, bold letters using <h1> tags
      document.write("<h1>Hello " + username + "!</h1>");

      // Display the greeting in an alert message using the same variable
      alert("Hello " + username + "!");
    </script>
  </body>
</html>
